<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم اشتراكات أبجد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .login-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .login-section input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-danger {
            background: #F44336;
            color: white;
        }

        .btn-warning {
            background: #FF9800;
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        .panel-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .notification-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        .notification-grid input,
        .notification-grid select,
        .notification-message {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        .notification-message {
            min-height: 110px;
            resize: vertical;
            margin-bottom: 12px;
            grid-column: 1 / -1;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .actions button {
            padding: 12px 30px;
            font-size: 16px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .info {
            background: #e3f2fd;
            color: #1565c0;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        .users-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .users-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f5f5f5;
            font-weight: bold;
            color: #333;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-premium {
            background: #4CAF50;
            color: white;
        }

        .status-trial {
            background: #FF9800;
            color: white;
        }

        .status-expired {
            background: #F44336;
            color: white;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header, .login-section, .panel-section, .users-section {
                padding: 18px;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .users-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .users-toolbar h2, .users-toolbar .btn {
                width: 100%;
            }

            table {
                font-size: 14px;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔔 لوحة تحكم الإشعارات - أبجد</h1>
            <p>إرسال الإشعارات مباشرة بدون سيرفر محلي</p>
        </div>

        <div id="loginSection" class="login-section">
            <h2 style="margin-bottom: 20px;">تسجيل دخول المسؤول</h2>
            <input type="email" id="adminEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="adminPassword" placeholder="كلمة المرور">
            <button class="btn btn-primary" onclick="adminLogin()" style="width: 100%; margin-top: 10px;">تسجيل الدخول</button>
            <div id="loginError"></div>
        </div>

        <div id="dashboardSection" class="hidden">
            <div class="stats">
                <div class="stat-card">
                    <h3>إجمالي المستخدمين</h3>
                    <div class="number" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>لديهم Push Token</h3>
                    <div class="number" id="tokenUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>المشتركون المميزون</h3>
                    <div class="number" id="premiumUsers">0</div>
                </div>
            </div>

            <div class="panel-section">
                <h2 style="margin-bottom: 20px;">📤 إرسال إشعار فوري</h2>
                
                <div class="info">
                    ✅ لا تحتاج إلى سيرفر محلي - الإرسال مباشر من Firebase!
                </div>

                <div class="notification-grid">
                    <input type="text" id="notificationTitle" placeholder="عنوان الإشعار *" required>
                    <select id="notificationAudience">
                        <option value="all">كل المستخدمين</option>
                        <option value="authenticated">المسجلون فقط</option>
                        <option value="premium">المشتركون المميزون</option>
                    </select>
                </div>

                <textarea id="notificationBody" class="notification-message" placeholder="نص الإشعار *" required></textarea>

                <div id="notificationStatus"></div>

                <div class="actions">
                    <button class="btn btn-success" onclick="sendPushNotification()">إرسال الإشعار 🚀</button>
                    <button class="btn btn-primary" onclick="resetForm()">مسح النموذج</button>
                    <button class="btn btn-warning" onclick="logout()">تسجيل الخروج</button>
                </div>
            </div>

            <div class="users-section">
                <div class="users-toolbar">
                    <h2>👥 قائمة المستخدمين</h2>
                </div>

                <input type="text" class="search-box" id="searchBox" placeholder="البحث عن مستخدم..." onkeyup="filterUsers()">

                <div id="usersTable">
                    <div class="loading">جاري تحميل البيانات...</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAtlvi9FkkEn-opEaYpicOgIJO_1z1ZOds",
            authDomain: "abjedsub.firebaseapp.com",
            projectId: "abjedsub",
            storageBucket: "abjedsub.firebasestorage.app",
            messagingSenderId: "311337513954",
            appId: "1:311337513954:web:0458fddeabf322b0d2ffbb",
            measurementId: "G-T276ZS6TJF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allUsers = [];
        let currentAdmin = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentAdmin = user;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                loadUsers();
            } else {
                currentAdmin = null;
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('dashboardSection').classList.add('hidden');
            }
        });

        window.adminLogin = async function() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                errorDiv.innerHTML = '';
            } catch (error) {
                errorDiv.innerHTML = `<div class="error">خطأ: ${error.message}</div>`;
            }
        };

        window.logout = async function() {
            await signOut(auth);
        };

        async function loadUsers() {
            try {
                const usersSnapshot = await getDocs(collection(db, 'users'));
                allUsers = [];

                usersSnapshot.forEach((documentItem) => {
                    const userData = documentItem.data();
                    allUsers.push({
                        id: documentItem.id,
                        ...userData,
                        email: userData.email || 'غير محدد',
                        displayName: userData.displayName || userData.display_name || 'غير محدد',
                        is_premium: userData.is_premium || false,
                        expoPushToken: userData.expoPushToken || null
                    });
                });

                updateStats();
                displayUsers(allUsers);
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersTable').innerHTML = `<div class="error">خطأ في تحميل المستخدمين: ${error.message}</div>`;
            }
        }

        function updateStats() {
            const total = allUsers.length;
            const tokenUsers = allUsers.filter(u => u.expoPushToken).length;
            const premium = allUsers.filter(u => u.is_premium === true).length;

            document.getElementById('totalUsers').textContent = total;
            document.getElementById('tokenUsers').textContent = tokenUsers;
            document.getElementById('premiumUsers').textContent = premium;
        }

        function displayUsers(users) {
            const tableDiv = document.getElementById('usersTable');

            if (users.length === 0) {
                tableDiv.innerHTML = '<div class="loading">لا يوجد مستخدمون</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>البريد الإلكتروني</th>
                            <th>الحالة</th>
                            <th>Push Token</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach((user) => {
                const status = user.is_premium ? 'مميز' : 'عادي';
                const statusClass = user.is_premium ? 'status-premium' : 'status-trial';
                const hasToken = user.expoPushToken ? '✅' : '❌';

                html += `
                    <tr>
                        <td>${user.displayName}</td>
                        <td>${user.email}</td>
                        <td><span class="status-badge ${statusClass}">${status}</span></td>
                        <td>${hasToken}</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            tableDiv.innerHTML = html;
        }

        window.filterUsers = function() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allUsers.filter((user) =>
                user.email.toLowerCase().includes(searchTerm) ||
                (user.displayName && user.displayName.toLowerCase().includes(searchTerm))
            );
            displayUsers(filtered);
        };

        window.resetForm = function() {
            document.getElementById('notificationTitle').value = '';
            document.getElementById('notificationBody').value = '';
            document.getElementById('notificationAudience').value = 'all';
            document.getElementById('notificationStatus').innerHTML = '';
        };

        window.sendPushNotification = async function() {
            const title = document.getElementById('notificationTitle').value.trim();
            const body = document.getElementById('notificationBody').value.trim();
            const audience = document.getElementById('notificationAudience').value;
            const statusBox = document.getElementById('notificationStatus');

            if (!title || !body) {
                statusBox.innerHTML = '<div class="error">أدخل العنوان والنص أولاً</div>';
                return;
            }

            try {
                statusBox.innerHTML = '<div class="info">⏳ جاري الإرسال...</div>';

                const usersSnapshot = await getDocs(collection(db, 'users'));
                const tokens = [];

                usersSnapshot.forEach(doc => {
                    const data = doc.data();
                    const token = data.expoPushToken;
                    if (!token) return;
                    if (audience === 'premium' && !data.is_premium) return;
                    if (audience === 'authenticated' && !data.email) return;
                    tokens.push(token);
                });

                if (tokens.length === 0) {
                    statusBox.innerHTML = '<div class="error">❌ لا يوجد مستخدمون لديهم push token</div>';
                    return;
                }

                let success = 0, failed = 0;

                for (const token of tokens) {
                    try {
                        const response = await fetch('https://exp.host/--/api/v2/push/send', {
                            method: 'POST',
                            headers: {
                                'Accept': 'application/json',
                                'Accept-Encoding': 'gzip, deflate',
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                to: token,
                                sound: 'default',
                                title: title,
                                body: body,
                                data: { audience }
                            })
                        });

                        if (response.ok) {
                            success++;
                        } else {
                            failed++;
                        }
                    } catch (e) {
                        failed++;
                    }
                }

                statusBox.innerHTML = `<div class="success">✅ تم إرسال الإشعار لـ ${success} مستخدم بنجاح! 🔔${failed > 0 ? ` (فشل: ${failed})` : ''}</div>`;
                resetForm();
            } catch (error) {
                statusBox.innerHTML = `<div class="error">❌ خطأ: ${error.message}</div>`;
            }
        };
    </script>
</body>
</html>
