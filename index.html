<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الاشتراكات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .login-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .login-section input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-danger {
            background: #F44336;
            color: white;
        }

        .btn-warning {
            background: #FF9800;
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        .users-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f5f5f5;
            font-weight: bold;
            color: #333;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-premium {
            background: #4CAF50;
            color: white;
        }

        .status-trial {
            background: #FF9800;
            color: white;
        }

        .status-expired {
            background: #F44336;
            color: white;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .actions button {
            padding: 8px 15px;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 لوحة تحكم الاشتراكات</h1>
            <p>إدارة المستخدمين والاشتراكات</p>
        </div>

        <!-- Login Section -->
        <div id="loginSection" class="login-section">
            <h2 style="margin-bottom: 20px;">تسجيل دخول المسؤول</h2>
            <input type="email" id="adminEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="adminPassword" placeholder="كلمة المرور">
            <button class="btn btn-primary" onclick="adminLogin()">تسجيل الدخول</button>
            <div id="loginError"></div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" class="hidden">
            <!-- Statistics -->
            <div class="stats">
                <div class="stat-card">
                    <h3>إجمالي المستخدمين</h3>
                    <div class="number" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>المشتركون المميزون</h3>
                    <div class="number" id="premiumUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>في فترة التجربة</h3>
                    <div class="number" id="trialUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>منتهي الصلاحية</h3>
                    <div class="number" id="expiredUsers">0</div>
                </div>
            </div>

            <!-- Users Table -->
            <div class="users-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>قائمة المستخدمين</h2>
                    <button class="btn btn-warning" onclick="logout()">تسجيل الخروج</button>
                </div>
                
                <input type="text" class="search-box" id="searchBox" placeholder="🔍 البحث عن مستخدم..." onkeyup="filterUsers()">
                
                <div id="usersTable">
                    <div class="loading">جاري تحميل البيانات...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAtlvi9FkkEn-opEaYpicOgIJO_1z1ZOds",
            authDomain: "abjedsub.firebaseapp.com",
            projectId: "abjedsub",
            storageBucket: "abjedsub.firebasestorage.app",
            messagingSenderId: "311337513954",
            appId: "1:311337513954:web:0458fddeabf322b0d2ffbb",
            measurementId: "G-T276ZS6TJF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allUsers = [];
        let currentAdmin = null;

        // التحقق من حالة تسجيل الدخول عند تحميل الصفحة
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentAdmin = user;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                loadUsers();
            } else {
                currentAdmin = null;
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('dashboardSection').classList.add('hidden');
            }
        });

        // Admin Login
        window.adminLogin = async function() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                currentAdmin = userCredential.user;
                
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                
                await loadUsers();
            } catch (error) {
                errorDiv.innerHTML = `<div class="error">خطأ: ${error.message}</div>`;
            }
        };

        // Logout
        window.logout = async function() {
            await signOut(auth);
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            currentAdmin = null;
        };

        // Load Users
        async function loadUsers() {
            try {
                const usersSnapshot = await getDocs(collection(db, 'users'));
                allUsers = [];
                
                console.log('Total users found:', usersSnapshot.size);
                
                usersSnapshot.forEach((doc) => {
                    const userData = doc.data();
                    console.log('User data:', userData);
                    allUsers.push({ 
                        id: doc.id, 
                        ...userData,
                        // تأكد من وجود الحقول الضرورية
                        email: userData.email || 'غير محدد',
                        displayName: userData.displayName || userData.display_name || 'غير محدد',
                        is_premium: userData.is_premium || false,
                        trial_end_date: userData.trial_end_date || userData.trialEndDate || new Date().toISOString()
                    });
                });

                console.log('Processed users:', allUsers);
                updateStats();
                displayUsers(allUsers);
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('usersTable').innerHTML = `<div class="error">خطأ في تحميل المستخدمين: ${error.message}</div>`;
            }
        }

        // Update Statistics
        function updateStats() {
            const total = allUsers.length;
            const premium = allUsers.filter(u => u.is_premium === true).length;
            const trial = allUsers.filter(u => {
                if (u.is_premium) return false;
                try {
                    const endDate = new Date(u.trial_end_date);
                    return endDate > new Date();
                } catch {
                    return false;
                }
            }).length;
            const expired = allUsers.filter(u => {
                if (u.is_premium) return false;
                try {
                    const endDate = new Date(u.trial_end_date);
                    return endDate <= new Date();
                } catch {
                    return true;
                }
            }).length;

            document.getElementById('totalUsers').textContent = total;
            document.getElementById('premiumUsers').textContent = premium;
            document.getElementById('trialUsers').textContent = trial;
            document.getElementById('expiredUsers').textContent = expired;
        }

        // Display Users
        function displayUsers(users) {
            const tableDiv = document.getElementById('usersTable');
            
            if (users.length === 0) {
                tableDiv.innerHTML = '<div class="loading">لا يوجد مستخدمين أو لم يتم التحميل بعد</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>الإجراءات</th>
                            <th>الحالة</th>
                            <th>تاريخ الانتهاء</th>
                            <th>البريد الإلكتروني</th>
                            <th>الاسم</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach(user => {
                const status = getStatus(user);
                const statusClass = status === 'premium' ? 'status-premium' : 
                                  status === 'trial' ? 'status-trial' : 'status-expired';
                const statusText = status === 'premium' ? 'مميز' : 
                                 status === 'trial' ? 'تجربة' : 'منتهي';
                
                let endDateText = 'غير محدد';
                try {
                    const dateField = user.is_premium && user.subscription_end_date 
                        ? user.subscription_end_date 
                        : user.trial_end_date;
                    endDateText = new Date(dateField).toLocaleDateString('ar-EG');
                } catch {
                    endDateText = 'تاريخ غير صحيح';
                }

                html += `
                    <tr>
                        <td>
                            <div class="actions">
                                ${!user.is_premium ? 
                                    `<button class="btn btn-success" onclick="activateUser('${user.id}')">تفعيل</button>` :
                                    `<button class="btn btn-danger" onclick="deactivateUser('${user.id}')">إلغاء</button>`
                                }
                                <button class="btn btn-danger" onclick="deleteUser('${user.id}')">حذف</button>
                            </div>
                        </td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>${endDateText}</td>
                        <td>${user.email}</td>
                        <td>${user.displayName}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            tableDiv.innerHTML = html;
        }

        // Get User Status
        function getStatus(user) {
            if (user.is_premium === true) return 'premium';
            try {
                const endDate = new Date(user.trial_end_date);
                if (endDate > new Date()) return 'trial';
            } catch {
                // إذا فشل تحليل التاريخ
            }
            return 'expired';
        }

        // Filter Users
        window.filterUsers = function() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const filtered = allUsers.filter(user => 
                user.email.toLowerCase().includes(searchTerm) ||
                (user.displayName && user.displayName.toLowerCase().includes(searchTerm))
            );
            displayUsers(filtered);
        };

        // Activate User
        window.activateUser = async function(userId) {
            if (!confirm('هل أنت متأكد من تفعيل هذا المستخدم؟')) return;

            try {
                const userRef = doc(db, 'users', userId);
                const subscriptionEndDate = new Date();
                subscriptionEndDate.setFullYear(subscriptionEndDate.getFullYear() + 1);

                await updateDoc(userRef, {
                    is_premium: true,
                    subscription_status: 'premium',
                    activation_date: new Date().toISOString(),
                    subscription_end_date: subscriptionEndDate.toISOString(),
                    activated_by: currentAdmin.email,
                    updated_at: serverTimestamp()
                });

                alert('تم تفعيل المستخدم بنجاح! ينتهي الاشتراك في: ' + subscriptionEndDate.toLocaleDateString('ar-EG'));
                await loadUsers();
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        };

        // Deactivate User
        window.deactivateUser = async function(userId) {
            if (!confirm('هل أنت متأكد من إلغاء اشتراك هذا المستخدم؟')) return;

            try {
                const userRef = doc(db, 'users', userId);
                await updateDoc(userRef, {
                    is_premium: false,
                    subscription_status: 'expired',
                    updated_at: serverTimestamp()
                });

                alert('تم إلغاء الاشتراك بنجاح!');
                await loadUsers();
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        };

        // Delete User
        window.deleteUser = async function(userId) {
            if (!confirm('⚠️ تحذير: هل أنت متأكد من حذف هذا المستخدم نهائياً؟\nلا يمكن التراجع عن هذا الإجراء!')) return;

            try {
                const userRef = doc(db, 'users', userId);
                await deleteDoc(userRef);

                alert('تم حذف المستخدم بنجاح!');
                await loadUsers();
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        };
    </script>
</body>
</html>
